<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="E-TOLD">
<title>E-TOLD</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<style>
html,body{margin:0;width:100%;height:100%;background:#0A0A0A;color:#F5F0E8;font-family:Arial,sans-serif;overflow:hidden}
#loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#0A0A0A;z-index:10}
#loader img{width:min(180px,38vw);height:auto;filter:drop-shadow(0 0 20px rgba(218,165,32,.45))}
#loader h1{margin:0;color:#DAA520;letter-spacing:4px}
#loader p{margin:0;color:#c9bba2;text-align:center;max-width:420px;padding:0 20px}
#barwrap{width:min(320px,70vw);height:8px;background:#20150a;border-radius:999px;overflow:hidden;border:1px solid rgba(218,165,32,.35)}
#bar{width:10%;height:100%;background:linear-gradient(90deg,#A07810,#F0C040,#A07810);animation:load 1.4s linear infinite}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
#error{display:none;color:#ff8c8c;max-width:520px;font-size:14px;line-height:1.4;padding:0 20px;text-align:center}
#frame{position:fixed;inset:0;border:0;width:100%;height:100%;display:none;background:#0A0A0A}
</style>
</head>
<body>
<div id="loader">
  <img src="./assets/lion.png" alt="E-TOLD lion">
  <h1>E-TOLD</h1>
  <p>Loading exact app package…</p>
  <div id="barwrap"><div id="bar"></div></div>
  <div id="error"></div>
</div>
<iframe id="frame" allow="clipboard-write"></iframe>
<script src="./app-loader.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./service-worker.js').catch(function(err){ console.warn('SW register failed', err); });
  });
}
</script>
</body>
</html>
